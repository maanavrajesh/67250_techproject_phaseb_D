<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="author" content="Maanav Rajesh">
    <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
    <meta name="description" content="MonoMuse website redesign project">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - MonoMuse</title>
    <link rel="stylesheet" href="../static/style.css">
    <script src="../static/script.js" defer></script>
</head>
<body onload="addYear()">
    <div class="container">
        <header class="header">
            <img id="logo" src="../static/monomuse.png" alt="MonoMuse Museum Logo" />
        </header>
        <nav class="nav_bar">
            <a href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="exhibitions.html">Exhibitions</a>
            <a href="tickets.html">Tickets</a>
            <a href="checkout.html">Checkout</a>
        </nav>
        <main class="main">
            <h3>Purchase Tickets</h3>
            <form id="purchaseForm" style="display: none;">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required><br><br>
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required><br><br>
                
                <label for="ticketType">Ticket Type:</label>
                <select id="ticketType" name="ticketType" required>
                    <option value="">Select a ticket type</option>
                    <option value="General">General - $20</option>
                    <option value="Student">Student - $15</option>
                    <option value="Member">Member - $10</option>
                </select><br><br>
                
                <label for="quantity">Number of Tickets:</label>
                <input type="number" id="quantity" name="quantity" min="1" required><br><br>
                
                <label for="selectedDate">Selected Date:</label>
                <input type="text" id="selectedDate" name="selectedDate" readonly><br><br>
                
                <button type="button" onclick="submitPurchase()">Submit</button>
            </form>
        </main>
        <footer class="footer">
            <p id="copyYear"></p>
            <p>MonoMuse. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
