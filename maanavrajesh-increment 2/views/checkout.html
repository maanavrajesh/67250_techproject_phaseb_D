<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="author" content="Maanav Rajesh">
    <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
    <meta name="description" content="MonoMuse website redesign project">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - MonoMuse</title>
    <link rel="stylesheet" href="../static/style.css">
    <script src="../static/script.js" defer></script>
</head>
<body onload="addYear()">
    <img id="logo" src="../static/monomuse.png" alt="MonoMuse Museum Logo" />
    <nav>
        <a href="../index.html">Home</a>
        <a href="explore.html">Explore</a>
        <a href="exhibitions.html">Exhibitions</a>
        <a href="tickets.html">Tickets</a>
        <a id="navselected" href="checkout.html">Checkout</a>
    </nav>
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>
        
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>
        
        <label for="quantity">Ticket Quantity:</label>
        <input type="number" id="quantity" name="quantity" required><br><br>
        
        <button type="submit">Submit</button>
    </form>
    <footer>
        <p id="copyYear"></p>
        <p>MonoMuse. All rights reserved.</p>
    </footer>
</body>
</html>
