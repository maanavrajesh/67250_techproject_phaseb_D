<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="author" content="Maanav Rajesh">
    <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
    <meta name="description" content="MonoMuse website redesign project">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - MonoMuse</title>
    <link rel="stylesheet" href="../static/style.css">
    <script src="../static/script.js" defer></script>
</head>
<body class="inside-page" onload="addYear(); loadSelectedDate();">
    <div class="container">
        <!-- Main site navigation -->
        <header class="home-topbar">
            <div class="topbar-left">
                <button class="menu-btn" onclick="toggleMobileNav(this)" aria-label="Open navigation">&#9776;</button>
                <a class="brand" href="../index.html">
                    <img id="logo" src="../static/monomuse.png" alt="Museum logo" />
                    <span class="brand-name">MonoMuse</span>
                </a>
            </div>
            <nav class="nav_bar">
                <a href="../index.html">Home</a>
                <a href="explore.html">Explore</a>
                <a href="exhibitions.html">Exhibitions</a>
                <a href="tickets.html">Tickets</a>
                <a href="donor.html">Donor</a>
                <a href="checkout.html">Checkout</a>
            </nav>
            <a class="nav_cta" href="tickets.html">Buy Tickets</a>
        </header>
        <!-- Simple checkout form -->
        <main class="main content-box">
            <h3>Purchase Tickets</h3>
            <!-- This form is just a practice checkout page -->
            <form id="purchaseForm">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required>
                <p class="error-message" id="nameError"></p>

                <label for="selectedDate">Visit Date</label>
                <input type="date" id="selectedDate" name="selectedDate" required>
                <p class="error-message" id="dateError"></p>

                <label for="ticketType">Ticket Type</label>
                <select id="ticketType" name="ticketType" required onchange="updateTotal()">
                    <option value="">Select a ticket type</option>
                    <option value="General">General</option>
                    <option value="Student">Student</option>
                    <option value="Member">Member</option>
                </select>
                <p class="error-message" id="ticketTypeError"></p>

                <label for="quantity">Ticket Quantity (1-10)</label>
                <input type="number" id="quantity" name="quantity" min="1" max="10" required oninput="updateTotal()">
                <p class="error-message" id="quantityError"></p>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
                <p class="error-message" id="emailError"></p>

                <label for="zipCode">Zip Code (optional)</label>
                <input type="text" id="zipCode" name="zipCode" maxlength="5">
                <p class="error-message" id="zipCodeError"></p>

                <label class="checkbox-row" for="mailingList">
                    <input type="checkbox" id="mailingList" name="mailingList">
                    Join our mailing list
                </label>

                <p class="total-text">Total Cost: <span id="totalCost">$0</span></p>

                <button type="button" onclick="submitPurchase()">Place Order</button>
            </form>
        </main>
        <footer class="footer">
            <p id="copyYear"></p>
            <p>MonoMuse. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
